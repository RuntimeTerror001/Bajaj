<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BFHL — Tree Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0f1a;
      --surface: #111827;
      --surface2: #1a2235;
      --border: #1f2d45;
      --accent: #38bdf8;
      --accent2: #818cf8;
      --green: #34d399;
      --red: #f87171;
      --yellow: #fbbf24;
      --text: #e2e8f0;
      --muted: #64748b;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 2rem 2.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logo-badge {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      width: 42px; height: 42px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 0.75rem;
      color: #0b0f1a;
      flex-shrink: 0;
    }
    h1 { font-family: var(--mono); font-size: 1.1rem; letter-spacing: 0.05em; color: var(--text); }
    h1 span { color: var(--accent); }
    .subtitle { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 0;
      height: calc(100vh - 90px);
    }

    /* ── Left panel ── */
    .input-panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      gap: 1rem;
      overflow-y: auto;
    }

    label { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

    textarea {
      width: 100%;
      min-height: 200px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem 1rem;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.82rem;
      line-height: 1.7;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }

    .hint {
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      line-height: 1.6;
    }
    .hint code {
      font-family: var(--mono);
      color: var(--accent);
      font-size: 0.7rem;
    }

    .btn {
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      border: none;
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0b0f1a;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    .api-url-row {
      display: flex; gap: 0.5rem; align-items: center;
    }
    .api-url-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 0.75rem;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.72rem;
      outline: none;
    }
    .api-url-input:focus { border-color: var(--accent); }

    /* ── Right panel ── */
    .output-panel {
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      color: var(--muted);
    }
    .empty-icon { font-size: 3rem; opacity: 0.3; }
    .empty-state p { font-size: 0.85rem; }

    /* ── Cards ── */
    .section-title {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .meta-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.2rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }
    .meta-item { display: flex; flex-direction: column; gap: 2px; }
    .meta-item .key { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .meta-item .val { font-family: var(--mono); font-size: 0.8rem; color: var(--accent); }

    .summary-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
    }
    .stat-number { font-family: var(--mono); font-size: 1.8rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }

    .hierarchy-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 0.75rem;
    }
    .h-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.2rem;
      transition: border-color 0.2s;
    }
    .h-card:hover { border-color: var(--accent2); }
    .h-card.cyclic { border-left: 3px solid var(--red); }
    .h-card.tree   { border-left: 3px solid var(--green); }

    .h-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .h-root {
      font-family: var(--mono);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }
    .badge {
      font-size: 0.62rem;
      padding: 2px 8px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }
    .badge-green { background: rgba(52,211,153,0.15); color: var(--green); }
    .badge-red   { background: rgba(248,113,113,0.15); color: var(--red); }
    .badge-blue  { background: rgba(56,189,248,0.15); color: var(--accent); }

    .depth-chip {
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .depth-chip span { color: var(--accent2); font-family: var(--mono); }

    .tree-view {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--surface2);
      border-radius: 6px;
      padding: 0.6rem 0.75rem;
      margin-top: 0.5rem;
      line-height: 1.8;
      max-height: 160px;
      overflow-y: auto;
    }
    .tree-node { color: var(--text); }
    .tree-connector { color: var(--border); }

    .tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .tag {
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 5px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .tag.invalid { border-color: rgba(248,113,113,0.4); color: var(--red); }
    .tag.dup     { border-color: rgba(251,191,36,0.4);  color: var(--yellow); }

    .error-banner {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      color: var(--red);
      border-radius: 8px;
      padding: 0.9rem 1rem;
      font-size: 0.82rem;
    }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; height: auto; }
      .input-panel { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-badge">BFHL</div>
  <div>
    <h1><span>//</span> Tree Analyzer</h1>
    <p class="subtitle">SRM Full Stack Engineering Challenge</p>
  </div>
</header>

<main>
  <!-- LEFT: input -->
  <div class="input-panel">
    <div>
      <label>API Base URL</label>
      <div class="api-url-row" style="margin-top:6px">
        <input class="api-url-input" id="apiUrl" value="http://localhost:3000" placeholder="https://your-api.onrender.com"/>
      </div>
    </div>

    <div>
      <label>Node Strings (one per line or comma-separated)</label>
      <textarea id="inputArea" placeholder='A->B&#10;A->C&#10;B->D&#10;X->Y&#10;Y->Z&#10;Z->X&#10;hello&#10;1->2'
        style="margin-top:6px"></textarea>
    </div>

    <div class="hint">
      <strong style="color:var(--text)">Valid format:</strong> <code>X->Y</code> where X and Y are single uppercase letters (A–Z).<br/>
      Invalid: <code>hello</code> · <code>1->2</code> · <code>AB->C</code> · <code>A->A</code> · <code>A-></code>
    </div>

    <button class="btn btn-primary" id="submitBtn" onclick="submit()">Analyze →</button>
    <button class="btn btn-ghost" onclick="loadExample()">Load Example</button>
  </div>

  <!-- RIGHT: output -->
  <div class="output-panel" id="outputPanel">
    <div class="empty-state">
      <div class="empty-icon">🌲</div>
      <p>Enter node strings and click <strong>Analyze</strong></p>
    </div>
  </div>
</main>

<script>
  const EXAMPLE = [
    "A->B","A->C","B->D","C->E","E->F",
    "X->Y","Y->Z","Z->X",
    "P->Q","Q->R",
    "G->H","G->H","G->I",
    "hello","1->2","A->"
  ].join('\n');

  function loadExample() {
    document.getElementById('inputArea').value = EXAMPLE;
  }

  function parseInput(raw) {
    return raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
  }

  async function submit() {
    const btn = document.getElementById('submitBtn');
    const panel = document.getElementById('outputPanel');
    const raw = document.getElementById('inputArea').value;
    const apiBase = document.getElementById('apiUrl').value.replace(/\/$/, '');
    const data = parseInput(raw);

    if (!data.length) return;

    btn.disabled = true;
    panel.innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';

    try {
      const res = await fetch(`${apiBase}/bfhl`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      renderOutput(json, panel);
    } catch (e) {
      panel.innerHTML = `<div class="error-banner">❌ API call failed: ${e.message}<br/><small style="opacity:0.6">Make sure the API is running and CORS is enabled.</small></div>`;
    } finally {
      btn.disabled = false;
    }
  }

  function renderTree(obj, indent = 0) {
    let html = '';
    for (const [key, val] of Object.entries(obj)) {
      const prefix = indent === 0 ? '' : '│  '.repeat(indent - 1) + '├─ ';
      html += `<div><span class="tree-connector">${prefix}</span><span class="tree-node">${key}</span></div>`;
      html += renderTree(val, indent + 1);
    }
    return html;
  }

  function renderOutput(data, panel) {
    let html = '';

    // ── Meta info
    html += `<div>
      <p class="section-title">Identity</p>
      <div class="meta-card">
        <div class="meta-item"><span class="key">User ID</span><span class="val">${data.user_id}</span></div>
        <div class="meta-item"><span class="key">Email</span><span class="val">${data.email_id}</span></div>
        <div class="meta-item"><span class="key">Roll No.</span><span class="val">${data.college_roll_number}</span></div>
      </div>
    </div>`;

    // ── Summary
    const s = data.summary;
    html += `<div>
      <p class="section-title">Summary</p>
      <div class="summary-row">
        <div class="stat-card">
          <div class="stat-number">${s.total_trees}</div>
          <div class="stat-label">Valid Trees</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${s.total_cycles}</div>
          <div class="stat-label">Cycles</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${s.largest_tree_root || '—'}</div>
          <div class="stat-label">Largest Root</div>
        </div>
      </div>
    </div>`;

    // ── Hierarchies
    if (data.hierarchies?.length) {
      html += `<div><p class="section-title">Hierarchies (${data.hierarchies.length})</p>
        <div class="hierarchy-grid">`;

      for (const h of data.hierarchies) {
        const isCyclic = !!h.has_cycle;
        html += `<div class="h-card ${isCyclic ? 'cyclic' : 'tree'}">
          <div class="h-header">
            <span class="h-root">${h.root}</span>
            <div style="display:flex;gap:6px;align-items:center">
              ${isCyclic
                ? `<span class="badge badge-red">Cycle</span>`
                : `<span class="badge badge-green">Tree</span>`}
            </div>
          </div>
          ${!isCyclic ? `<div class="depth-chip">Depth: <span>${h.depth}</span></div>` : ''}
          <div class="tree-view">
            ${isCyclic
              ? `<span style="color:var(--red);opacity:0.7">⟳ Cyclic — no tree structure</span>`
              : renderTree(h.tree)}
          </div>
        </div>`;
      }

      html += `</div></div>`;
    }

    // ── Invalid + Duplicates
    const hasInvalid = data.invalid_entries?.length;
    const hasDups = data.duplicate_edges?.length;

    if (hasInvalid || hasDups) {
      html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">`;

      if (hasInvalid) {
        html += `<div><p class="section-title">Invalid Entries (${data.invalid_entries.length})</p>
          <div class="tags-row">
            ${data.invalid_entries.map(e => `<span class="tag invalid">${e}</span>`).join('')}
          </div></div>`;
      }
      if (hasDups) {
        html += `<div><p class="section-title">Duplicate Edges (${data.duplicate_edges.length})</p>
          <div class="tags-row">
            ${data.duplicate_edges.map(e => `<span class="tag dup">${e}</span>`).join('')}
          </div></div>`;
      }

      html += `</div>`;
    }

    // ── Raw JSON
    html += `<div>
      <p class="section-title">Raw Response</p>
      <div class="tree-view" style="max-height:220px;white-space:pre-wrap">${JSON.stringify(data, null, 2)}</div>
    </div>`;

    panel.innerHTML = html;
  }
</script>
</body>
</html>
